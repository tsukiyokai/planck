# planck.yaml — Planck v0.1 Phase A: Rust Plan Compiler + PyO3
# Ref: docs/plans/2026-03-19-planck-design.md
#      docs/plans/2026-03-19-planck-v01-implementation.md

description: "Planck v0.1 Phase A — Rust Plan Compiler + PyO3，不依赖Ascend硬件"

defaults:
  skills: [vibe-opt]

vars:
  repo_dir: /Users/shanshan/repo/_me/planck

nodes:
  # ---- 上下文采集(并行) ----
  read_design:
    role: context
    prompt: |
      精读 docs/plans/2026-03-19-planck-design.md。
      提炼: 三层竞争优势、系统架构(Rust Plan Compiler + C++ Custom Ops + 双渠道交付)、
      Plan IR三层结构(CommGraph -> LogicalPlan -> ExecutionPlan)、
      9条原语指令(Put/Signal/Wait + 融合变体)、6个编译优化pass、v0.1 scope。

  read_plan:
    role: context
    prompt: |
      精读 docs/plans/2026-03-19-planck-v01-implementation.md。
      提炼: 7个chunk、文件结构、依赖关系图，以及每个task的:
      关键类型/结构体、测试规格、实现要求。
      聚焦Chunks 1-5 (Phase A, Rust + Python)。

  scan_repo:
    role: context
    type: shell
    cmd: >
      cd ${vars.repo_dir} &&
      echo "=== git status ===" && git status --short &&
      echo "=== file tree ===" && find . -not -path './.git/*' -not -path './target/*' -type f | head -80 &&
      echo "=== Cargo.toml ===" && cat Cargo.toml 2>/dev/null || echo "(not found)" &&
      echo "=== cargo test ===" && cargo test 2>&1 | tail -20 || echo "(cargo test failed or not configured)"

  # ---- 项目骨架 ----
  scaffold:
    deps: [read_design, read_plan, scan_repo]
    prompt: |
      实现Chunk 1: 项目骨架。

      设计文档: ${nodes.read_design.output}
      实现计划: ${nodes.read_plan.output}
      仓库现状: ${nodes.scan_repo.output}

      任务:
      1. Cargo workspace (root Cargo.toml, rust-toolchain.toml)
      2. planck-core crate，建空模块文件 (plan/topo/cost/algo/sched/template)
      3. planck-python crate骨架 (PyO3)
      4. pyproject.toml (maturin)
      5. 验证: `cargo build` 零warning通过

  gate_build:
    role: gate
    deps: [scaffold]
    type: shell
    cmd: "cd ${vars.repo_dir} && cargo build 2>&1"

  # ---- Plan IR + 拓扑(scaffold后并行) ----
  impl_ir:
    deps: [gate_build]
    prompt: |
      实现 plan.rs — Plan IR类型，C-compatible序列化。

      设计文档: ${nodes.read_design.output}
      实现计划: ${nodes.read_plan.output}

      关键类型(全部repr(C)):
      - PlanHeader (32B): magic/version/num_ops/num_buffers/num_streams/num_events/num_ranks/my_rank/flags
      - BufEntry (12B): pool/offset/size
      - OpEntry (16B): opcode/stream_id/reduce_op/flags/src_buf/dst_buf/dst_rank/wait_event/signal_event
      - Opcode enum: Put/Signal/Wait/LocalCopy/LocalReduce + 3个融合变体 + Noop
      - ExecutionPlan: header + Vec<BufEntry> + Vec<OpEntry> + serialize/deserialize

      TDD: 先写测试(size断言、magic验证、roundtrip)，再实现。

  impl_topo:
    deps: [gate_build]
    prompt: |
      实现 topo.rs — 8卡HCCS拓扑。

      实现计划: ${nodes.read_plan.output}

      关键类型: Link {src, dst, bandwidth_gbps, latency_us, transport}, Topology {num_ranks, links}
      方法: Topology::hccs_8card() (56条有向链路, 全互连, ~30 GB/s, ~1.5us)
            has_link(), get_link(), ring_order() -> [0,1,...,7]

      TDD: 3个测试(基础拓扑、ring邻居、链路属性)，先写测试再实现。

  gate_ir_topo:
    role: gate
    deps: [impl_ir, impl_topo]
    type: shell
    cmd: "cd ${vars.repo_dir} && cargo test -p planck-core -- plan topo 2>&1"

  # ---- 代价模型 ----
  impl_cost:
    deps: [gate_ir_topo]
    prompt: |
      实现 cost.rs — alpha-beta-gamma代价模型。

      实现计划: ${nodes.read_plan.output}

      CostModel {alpha_us, beta_us_per_byte, gamma_us_per_byte}
      - from_topology(): 从链路延迟提取alpha，从1/bandwidth提取beta
      - ring_allreduce(msg_size, num_ranks): T = 2(n-1)*alpha + 2(n-1)/n*M*beta + (n-1)/n*M*gamma

      TDD: 3个测试(from_topology、随规模缩放、精确公式校验)。

  gate_cost:
    role: gate
    deps: [impl_cost]
    type: shell
    cmd: "cd ${vars.repo_dir} && cargo test -p planck-core -- cost 2>&1"

  # ---- 算法 + 调度器 + 融合(顺序链) ----
  impl_algo:
    deps: [gate_cost]
    prompt: |
      实现 algo.rs — Ring AllReduce算法分解。

      实现计划: ${nodes.read_plan.output}

      ring_allreduce(num_ranks, my_rank) -> Vec<AlgoStep>
      AlgoStep {phase: RS|AG, step, send_chunk, recv_chunk, dst_rank, src_rank, needs_reduce}

      Ring公式:
      - RS step k: send chunk (rank-k+n)%n, recv chunk (rank-k-1+n)%n
      - AG step k: send chunk (rank-k+1+n)%n, recv chunk (rank-k+n)%n
      - dst = (rank+1)%n, src = (rank-1+n)%n

      TDD: 4个测试(步数、收发rank、chunk索引、全chunk覆盖)。

  impl_sched:
    deps: [impl_algo]
    prompt: |
      实现 sched.rs — 双缓冲流水线调度器。

      实现计划: ${nodes.read_plan.output}

      schedule(steps, msg_size, pipeline_chunks) -> ScheduleResult {ops, buffers, num_streams}

      每个pipeline chunk c (stream c)，每个AlgoStep:
        RS -> Put(send) + Signal(dst) + Wait(src) + LocalReduce(recv->accum)
        AG -> Put(send) + Signal(dst) + Wait(src) + LocalCopy(recv->output)

      Buffer布局: Input(用户tensor), Scratch(每chunk 2个, 双缓冲, size=msg/(chunks*ranks))
      stream_id = pipeline_chunk_index

      TDD: 4个测试(产生ops、使用c个stream、buffer大小、每stream的op序列)。

  impl_fusion:
    deps: [impl_sched]
    adaptive: true
    prompt: |
      在plan.rs中添加: 指令融合pass和顶层compile()函数。

      实现计划: ${nodes.read_plan.output}

      fuse(ops) -> 融合后ops。模式(贪心, 最长优先):
      - Wait + LocalReduce + Put -> WaitReducePut
      - Wait + LocalReduce + LocalCopy -> WaitReduceCopy
      - Put + Signal -> PutWithSignal

      compile(CompileRequest, Topology) -> ExecutionPlan
      流水线: topo -> cost -> algo -> sched -> fuse -> 构建ExecutionPlan

      TDD: 4个测试(融合pattern、保留不可融合指令、compile产出合法plan)。

  gate_compiler:
    role: gate
    deps: [impl_fusion]
    type: shell
    cmd: "cd ${vars.repo_dir} && cargo test -p planck-core 2>&1"

  # ---- 模板 + 仿真 ----
  impl_template:
    deps: [gate_compiler]
    prompt: |
      实现Chunk 4: template.rs + 端到端仿真测试。

      实现计划: ${nodes.read_plan.output}

      1. PlanTemplate: 冻结指令图，参数化buffer大小。
         from_plan(plan, slots) / instantiate(params) -> ExecutionPlan
         instantiate必须亚微秒级。

      2. plan.rs仿真测试: 为全部8个rank编译plan，
         在测试数据上模拟Ring AllReduce (rank r持有 [r+1, r+1, ...])，
         验证所有rank产出 [36.0, ...] (1..8之和)。

      3. Criterion benchmark: compile <1ms, instantiate <1us。

  gate_simulation:
    role: gate
    deps: [impl_template]
    type: shell
    cmd: "cd ${vars.repo_dir} && cargo test -p planck-core -- simulate 2>&1"

  # ---- PyO3绑定 ----
  impl_pyo3:
    deps: [gate_simulation]
    prompt: |
      实现Chunk 5: PyO3绑定。

      实现计划: ${nodes.read_plan.output}

      planck-python/src/lib.rs:
      - PlanCompiler: hccs_8card(), compile_allreduce(), compile_template()
      - PlanCache: get_allreduce()，用HashMap缓存
      - PyPlanView: num_ranks/my_rank/num_ops/num_buffers/to_bytes()
      - 编译期释放GIL: py.allow_threads(|| ...)

      python/planck/__init__.py: 重导出PlanCompiler, PlanCache
      tests/test_plan_compile.py: import、编译、缓存、模板测试

      构建: maturin develop，然后pytest。

  gate_python:
    role: gate
    deps: [impl_pyo3]
    type: shell
    cmd: "cd ${vars.repo_dir} && maturin develop 2>&1 && pytest tests/test_plan_compile.py -v 2>&1"

  # ---- 报告 ----
  report:
    role: meta
    deps: [gate_python]
    prompt: |
      撰写Planck v0.1 Phase A实现总结报告。

      各阶段结果:
      - 骨架: ${nodes.gate_build.status}
      - IR + 拓扑: ${nodes.gate_ir_topo.status}
      - 代价模型: ${nodes.gate_cost.status}
      - 编译器(algo+sched+fusion): ${nodes.gate_compiler.status}
      - 仿真: ${nodes.gate_simulation.status}
      - PyO3绑定: ${nodes.gate_python.status}

      包含: 实现内容、测试结果、编译benchmark数据、
      遇到的问题、Phase B(C++ on Ascend硬件)就绪度评估。

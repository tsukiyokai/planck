# planck-phase-b.yaml — Phase B macOS: C++ Execution + planck-sim DES
# Design: docs/plans/2026-03-20-phase-b-macos-design.md
# Impl:   docs/plans/2026-03-20-phase-b-macos-impl.md

description: "Planck v0.1 Phase B macOS — C++ Executor + PyTorch Eager + DES Simulator"

defaults:
  skills: [vibe-opt]

auto_commit:
  push: true

vars:
  repo_dir: /Users/shanshan/repo/_me/planck

nodes:
  # ==== Context (parallel) ====
  read_design:
    role: context
    max_runs: 1
    prompt: |
      精读 docs/plans/2026-03-20-phase-b-macos-design.md 和 docs/plans/2026-03-20-phase-b-macos-impl.md。
      只读不写代码。提炼: Block 1 (C++ Executor + PyTorch Eager) 和 Block 2 (planck-sim DES) 的关键设计决策。
      特别注意: WaitReducePut的_pad字段处理、MockWorld远端buffer寻址、3轮notify握手、GET模式、InlineReduce重叠。

  read_phase_a:
    role: context
    max_runs: 1
    prompt: |
      精读 SHARED_TASK_NOTES.md 了解Phase A产出。
      精读 crates/planck-core/src/plan.rs 的 simulate_plan_execution 测试 (约line 543-681)，
      理解Rust lockstep仿真的逻辑——C++ executor和planck-sim都要复现这个逻辑。
      只读不写代码。

  scan_repo:
    role: context
    type: shell
    cmd: >
      . "$HOME/.cargo/env" 2>/dev/null;
      cd ${vars.repo_dir} &&
      echo "=== git status ===" && git status --short &&
      echo "=== file tree ===" && find . -not -path './.git/*' -not -path './target/*' -type f | head -100 &&
      echo "=== cargo test ===" && cargo test -p planck-core 2>&1 | tail -20 || echo "(cargo test failed)"

  # ==== Block 1: C++ Execution Layer ====

  # -- Fixtures --
  gen_fixtures:
    deps: [read_design, read_phase_a, scan_repo]
    type: shell
    cmd: >
      . "$HOME/.cargo/env" 2>/dev/null;
      cd ${vars.repo_dir} &&
      maturin develop 2>&1 | tail -5 &&
      mkdir -p csrc/test/fixtures &&
      python scripts/gen_fixtures.py

  # -- C++ Headers + Mock + CMake --
  impl_cpp_ffi:
    deps: [gen_fixtures]
    prompt: |
      实现Phase B impl plan的Chunk 1 + Chunk 2 (Tasks 2-6)。

      设计文档: ${nodes.read_design.output}
      Phase A上下文: ${nodes.read_phase_a.output}
      仓库现状: ${nodes.scan_repo.output}

      创建以下文件:
      1. csrc/CMakeLists.txt — cmake项目, C++20, planck_core static lib
      2. csrc/test/test_util.h — ~30行测试宏 (CHECK/CHECK_EQ/CHECK_NEAR/RUN/TEST_MAIN)
      3. csrc/include/planck/plan.h — #pragma pack(push,1), 镜像Rust repr(C): PlanHeader(32B), BufEntry(12B), OpEntry(16B), PlanView类
      4. csrc/include/planck/transport.h — Transport抽象基类, put(dst_rank, src, size, remote_buf_idx, offset)
      5. csrc/include/planck/executor.h — Executor类声明
      6. csrc/transport/mock.cpp — MockWorld: 共享内存 + mutex/condvar for signal/wait
      7. csrc/test/test_plan.cpp — struct size断言 + fixture roundtrip验证

      关键: plan.h的struct大小必须和Rust完全一致(static_assert验证)。
      Transport::put()用buffer index(非裸指针)寻址远端buffer。
      MockWorld提供resolve_remote(rank, buf_idx)跨rank寻址。

      实现后运行: cd csrc && mkdir -p build && cd build && cmake .. && cmake --build . && ctest -V

  gate_cpp_ffi:
    role: gate
    deps: [impl_cpp_ffi]
    type: shell
    cmd: >
      cd ${vars.repo_dir}/csrc &&
      mkdir -p build && cd build &&
      cmake .. 2>&1 && cmake --build . 2>&1 && ctest -V 2>&1

  # -- Executor + 8-Rank Test --
  impl_executor:
    deps: [gate_cpp_ffi]
    prompt: |
      实现Phase B impl plan的Chunk 3 (Tasks 7-8)。

      设计文档: ${nodes.read_design.output}
      Phase A上下文: ${nodes.read_phase_a.output}

      创建:
      1. csrc/executor/engine.cpp — Executor::execute(): for-loop遍历OpEntry, 处理9种opcode
      2. csrc/test/test_executor.cpp — 8线程并行, 每rank一个thread+MockTransport
      3. 更新CMakeLists.txt添加engine.cpp和test_executor

      关键(_pad字段处理):
      - WaitReducePut: Wait -> Reduce(dst_buf += src_buf) -> Put(dst_buf -> remote[_pad])
      - WaitReduceCopy: Wait -> Reduce(buf[_pad] += src_buf) -> Copy(buf[_pad] -> dst_buf)
      参考plan.rs lines 633-661的Rust实现。

      8-rank测试: 输入rank r=[r+1,...], 期望输出全部=[36.0,...]
      使用csrc/test/fixtures/plan_rank*.bin作为测试数据。

      实现后运行: cd csrc/build && cmake --build . && ctest -V

  gate_executor:
    role: gate
    deps: [impl_executor]
    type: shell
    cmd: >
      cd ${vars.repo_dir}/csrc/build &&
      cmake --build . 2>&1 && ctest -R test_executor -V 2>&1

  # ==== Block 2: planck-sim DES (parallel with Block 1) ====

  impl_sim_core:
    deps: [read_design, read_phase_a, scan_repo]
    prompt: |
      实现Phase B impl plan的Chunk 5 (Tasks 11-12)。

      设计文档: ${nodes.read_design.output}
      Phase A上下文: ${nodes.read_phase_a.output}

      创建:
      1. crates/planck-core/Cargo.toml — 添加 [features] sim = ["toml","serde"], 可选依赖
      2. crates/planck-core/src/lib.rs — 添加 #[cfg(feature="sim")] pub mod sim;
      3. crates/planck-core/src/sim/mod.rs — pub fn simulate(plans, topo, config) -> Trace
      4. crates/planck-core/src/sim/config.rs — SimConfig + TOML解析 + size parser ("256MB"->usize)
      5. crates/planck-core/src/sim/engine.rs — DES: Event, BinaryHeap, Simulator主循环
      6. crates/planck-core/src/sim/link.rs — LinkState: active_flows, effective_bw = bw/flows

      DES引擎处理: OpStart/OpEnd/PutEnd/Unblock事件。
      Signal触发对端Wait解除阻塞。每个rank/stream独立调度。

      实现后运行: cargo test -p planck-core --features sim -- sim

  gate_sim_core:
    role: gate
    deps: [impl_sim_core]
    type: shell
    cmd: ". \"$HOME/.cargo/env\" 2>/dev/null; cd ${vars.repo_dir} && cargo test -p planck-core --features sim -- sim 2>&1"

  impl_sim_trace:
    deps: [gate_sim_core]
    prompt: |
      实现Phase B impl plan的Chunk 6 + Chunk 7 Tasks 13-15。

      设计文档: ${nodes.read_design.output}

      创建:
      1. crates/planck-core/src/sim/timing.rs — TimingModel trait + SimpleModel(alpha-beta) + AscendModel(3轮notify/GET模式/InlineReduce重叠)
      2. crates/planck-core/src/sim/trace.rs — Trace struct + Chrome Trace JSON: pid=rank, tid=stream, X events, metadata events
      3. sim/mod.rs中添加集成测试: pipeline_overlap(4chunk<1chunk), monotonic(大msg>小msg), trace_has_events

      AscendModel关键:
      - put_time = 2*latency + size/bw (GET模式)
      - notify_time = 3*latency (3轮握手)
      - inline_reduce_put_time = notify + max(reduce, put) (InlineReduce重叠)

      实现后运行: cargo test -p planck-core --features sim -- sim

  gate_sim:
    role: gate
    deps: [impl_sim_trace]
    type: shell
    cmd: ". \"$HOME/.cargo/env\" 2>/dev/null; cd ${vars.repo_dir} && cargo test -p planck-core --features sim -- sim 2>&1"

  # -- PyO3 + Python Test --
  impl_sim_pyo3:
    deps: [gate_sim]
    prompt: |
      实现Phase B impl plan的Chunk 7 Tasks 16-17。

      创建/修改:
      1. crates/planck-python/Cargo.toml — planck-core依赖加features=["sim"]
      2. crates/planck-python/src/lib.rs — 添加simulate() PyO3函数, 接受Vec<PyPlanView>+可选TOML字符串
      3. python/planck/__init__.py — 添加simulate重导出
      4. tests/test_sim.py — 3个测试: JSON有效/TOML配置/pipeline更多事件
      5. planck-sim.toml — 示例配置文件

      实现后运行: maturin develop && pytest tests/test_sim.py -v

  gate_sim_py:
    role: gate
    deps: [impl_sim_pyo3]
    type: shell
    cmd: ". \"$HOME/.cargo/env\" 2>/dev/null; cd ${vars.repo_dir} && maturin develop 2>&1 && pytest tests/test_sim.py -v 2>&1"

  # ==== Report ====
  report:
    role: meta
    max_runs: 1
    deps: [gate_executor, gate_sim_py]
    prompt: |
      撰写Phase B macOS实现总结报告。

      各阶段结果:
      - C++ FFI: ${nodes.gate_cpp_ffi.status}
      - Executor 8-rank: ${nodes.gate_executor.status}
      - planck-sim core: ${nodes.gate_sim_core.status}
      - planck-sim trace: ${nodes.gate_sim.status}
      - planck-sim PyO3: ${nodes.gate_sim_py.status}

      包含: 实现内容、测试结果、Chrome Trace截图描述、
      遇到的问题、Ascend硬件后残留项清单。
